# hello-scholar sample Codex configuration
#
# Runtime-managed sections are injected by:
#   node cli.mjs install codex --standby ...
#   node cli.mjs install codex --global ...
#
# The generated hello-scholar block in ~/.codex/config.toml owns:
# - selected agent registrations
# - the local plugin enable flag in global mode

model = "__MODEL__"
model_provider = "__PROVIDER_NAME__"
model_reasoning_effort = "medium"
disable_response_storage = true

[model_providers.__PROVIDER_NAME__]
name = "__PROVIDER_NAME__"
base_url = "__PROVIDER_URL__"
wire_api = "responses"
requires_openai_auth = true

sandbox_mode = "workspace-write"

[features]
multi_agent = true
memories = true

# Example optional MCP server
[mcp_servers.zotero]
command = "zotero-mcp"
args = ["serve"]
enabled = false
